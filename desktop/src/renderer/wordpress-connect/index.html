<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline';" />
  <title>Add WordPress site</title>
  <link rel="stylesheet" href="../common.css" />
  <link rel="stylesheet" href="wordpress-connect.css" />
</head>
<body>
  <main class="wp-connect">
    <header>
      <h1>Add a WordPress site</h1>
      <p class="subtitle">Specter signs in with WordPress Application Passwords. No plugin required.</p>
    </header>

    <section class="form">
      <label class="field">
        <span class="label">Site URL</span>
        <input id="wp-site-url" type="url" placeholder="https://example.com" autocomplete="off" />
      </label>

      <label class="field">
        <span class="label">Username</span>
        <input id="wp-username" type="text" autocomplete="off" />
      </label>

      <label class="field">
        <span class="label">Application Password</span>
        <input id="wp-app-password" type="password" placeholder="xxxx xxxx xxxx xxxx xxxx xxxx" autocomplete="off" />
      </label>

      <p class="help">
        <a id="wp-help-link" href="#">How to create an Application Password</a>
      </p>

      <div class="test-row">
        <button id="btn-test" type="button" disabled>Test Connection</button>
        <span id="test-spinner" class="spinner hidden" aria-hidden="true"></span>
        <span id="test-result" class="test-result"></span>
      </div>
    </section>

    <p id="save-error" class="save-error hidden"></p>

    <footer class="actions">
      <button id="btn-cancel" type="button" class="btn-secondary">Cancel</button>
      <button id="btn-connect" type="button" class="btn-primary" disabled>Connect</button>
    </footer>
  </main>

  <script type="module" src="wordpress-connect.js"></script>
</body>
</html>
